name: Agentic PR Review

on:
  push:
    # Trigger for all branches
    branches:
      - '**'
    # Only run when relevant files change to save costs/tokens
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

# Prevent multiple concurrent reviews on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Enable pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Check for API Key
        id: check_key
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::warning::GEMINI_API_KEY is missing. AI Review will be skipped. Please add it to your repository secrets."
            echo "has_key=false" >> $GITHUB_OUTPUT
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Agentic Review
        if: steps.check_key.outputs.has_key == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.0-flash"
        run: |
          python tools/scripts/agentic_review.py main > review_output.md || echo "Review script failed" > review_output.md
          echo -e "\n---\n" >> review_output.md

      - name: Run OSS Scan
        run: |
          python tools/scripts/oss_scan.py >> review_output.md || echo "OSS Scan failed" >> review_output.md

      - name: Post Review Comment
        if: success() && hashFiles('review_output.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'review_output.md';
            if (!fs.existsSync(path)) return;
            
            const reviewOutput = fs.readFileSync(path, 'utf8').trim();
            if (!reviewOutput) return;

            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: reviewOutput
              });
            } else if (context.eventName === 'push') {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: reviewOutput
              });
            }
